name: Test Discovery Engine API Bug
on: [push, workflow_dispatch]

jobs:
  test-agents-endpoint:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for GitHub OIDC
      contents: read
    
    steps:
    - name: Authenticate to Google Cloud via WIF
      id: auth
      uses: google-github-actions/auth@v2
      with:
        project_id: 'f1-staging-env'
        workload_identity_provider: 'projects/623111100246/locations/global/workloadIdentityPools/github/providers/github-provider'
    
    - name: Test /agents Endpoint (Expect 400 FAILED_PRECONDITION)
      run: |
        ACCESS_TOKEN="${{ steps.auth.outputs.access_token }}"
        curl -s -w "\nHTTP Status: %{http_code}\n" -X GET \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          -H "x-goog-user-project: f1-staging-env" \
          -H "Content-Type: application/json" \
          "https://us-discoveryengine.googleapis.com/v1alpha/projects/f1-staging-env/locations/us/collections/default_collection/agents"

    - name: Test /engines Endpoint (Expect 200 OK)
      run: |
        ACCESS_TOKEN="${{ steps.auth.outputs.access_token }}"
        curl -s -w "\nHTTP Status: %{http_code}\n" -X GET \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          -H "x-goog-user-project: f1-staging-env" \
          -H "Content-Type: application/json" \
          "https://us-discoveryengine.googleapis.com/v1alpha/projects/f1-staging-env/locations/us/collections/default_collection/engines"
